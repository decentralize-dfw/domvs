<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VEA Demo2 — Scene 4 · Interior Cameras (xlsx)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://mergvs.com/demo2-xlsx/demo2-style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">
        <div class="loading-title">VEA</div>
        <div class="loading-subtitle">Real Estate Experience · Scene 4</div>
        <div class="loading-bar-track"><div id="loadingProgressBar"></div></div>
        <div class="loading-tagline">İç Mekan Turu · xlsx-driven</div>
    </div>

    <img id="backgroundImg">
    <div id="sceneLoadingIndicator">Sahne Yükleniyor…</div>
    <div id="sceneTransitionOverlay"></div>

    <p id="modelLabel" class="vea-model-label">Oda</p>
    <button id="modelToggleBtn1" class="vea-model-toggle"></button>
    <button id="modelToggleBtn2" class="vea-model-toggle"></button>
    <button id="modelToggleBtn3" class="vea-model-toggle"></button>
    <button id="modelToggleBtn4" class="vea-model-toggle"></button>
    <button id="modelToggleBtn5" class="vea-model-toggle"></button>
    <button id="modelToggleBtn6" class="vea-model-toggle"></button>

    <div id="leftHtmlPanel"></div>
    <div id="rightHtmlPanel"></div>
    <div id="description"></div>

    <button id="fullscreenButton" class="fab-info-btn" title="Tam Ekran">⛶</button>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
        import { PMREMGenerator } from 'three';
        import {
            loadVeaConfig, yes, num,
            renderPanelHtml, assetUrlFor,
            parseCameraPositionAction
        } from 'https://mergvs.com/demo2-xlsx/xlsx-loader.js';

        const SCENE_INDEX = 4;

        let scene, renderer, composer, camera, orbitControls, pmremGenerator;
        let config = null;
        let sceneCfg = null;
        let cameraPositions = []; // Parsed from button actions
        const clock = new THREE.Clock();

        const loadingEl = document.getElementById('loading');
        const backgroundImgEl = document.getElementById('backgroundImg');
        const sceneLoadingIndicatorEl = document.getElementById('sceneLoadingIndicator');
        const leftHtmlPanel = document.getElementById('leftHtmlPanel');
        const rightHtmlPanel = document.getElementById('rightHtmlPanel');
        const descriptionEl = document.getElementById('description');
        const toggleButtons = [
            document.getElementById('modelToggleBtn1'),
            document.getElementById('modelToggleBtn2'),
            document.getElementById('modelToggleBtn3'),
            document.getElementById('modelToggleBtn4'),
            document.getElementById('modelToggleBtn5'),
            document.getElementById('modelToggleBtn6')
        ];

        function setLoadingProgress(pct) {
            const bar = document.getElementById('loadingProgressBar');
            if (bar) {
                bar.style.animation = 'none';
                bar.style.width = Math.min(100, Math.max(0, pct)) + '%';
                bar.style.background = '#c9a96e';
            }
        }
        function fadeOutLoading() {
            setLoadingProgress(100);
            setTimeout(() => {
                loadingEl.classList.add('fading');
                setTimeout(() => { loadingEl.style.display = 'none'; }, 550);
            }, 300);
        }

        function updatePanelsById(leftId, rightId) {
            const L = sceneCfg.panels[leftId];
            const R = sceneCfg.panels[rightId];
            leftHtmlPanel.innerHTML  = renderPanelHtml(L);
            rightHtmlPanel.innerHTML = renderPanelHtml(R);
            leftHtmlPanel.style.display  = L ? 'block' : 'none';
            rightHtmlPanel.style.display = R ? 'block' : 'none';
            leftHtmlPanel.scrollTop  = 0;
            rightHtmlPanel.scrollTop = 0;
        }

        function selectCamera(index) {
            toggleButtons.forEach((btn, i) => btn.classList.toggle('selected', i === index));
            const camPos = cameraPositions[index];
            if (!camPos) return;

            camera.position.set(camPos.pos.x, camPos.pos.y, camPos.pos.z);
            camera.lookAt(camPos.lookAt.x, camPos.lookAt.y, camPos.lookAt.z);
            camera.fov = camPos.fov;
            camera.updateProjectionMatrix();

            orbitControls.target.set(camPos.lookAt.x, camPos.lookAt.y, camPos.lookAt.z);
            orbitControls.update();

            // Panel IDs are html_scene4_cam{N}_left/right where N = index+1
            const kod = btn.kod || `toggle-${index + 1}`;
            updatePanelsById(`${kod}-left`, `${kod}-right`);

            const btn = sceneCfg.buttons[index];
            descriptionEl.textContent = `Camera: ${btn?.name || ''}`;
            descriptionEl.style.display = 'block';
        }

        async function init() {
            try {
                config = await loadVeaConfig();
            } catch (e) {
                console.error('xlsx load failed:', e);
                sceneLoadingIndicatorEl.textContent = 'xlsx yüklenemedi';
                sceneLoadingIndicatorEl.style.display = 'block';
                return;
            }
            sceneCfg = config.scenes[SCENE_INDEX];

            // Pre-parse camera positions from each button's action column
            cameraPositions = sceneCfg.buttons.map(b => parseCameraPositionAction(b.action));

            if (config.bgImageUrl) backgroundImgEl.src = config.bgImageUrl;

            scene = new THREE.Scene();
            const cam = sceneCfg.camera;
            const defaultFov = num(cam['Default FOV']) || 80;

            // Scene 4 always uses a perspective camera
            camera = new THREE.PerspectiveCamera(defaultFov, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Initial position is taken from the first camera button (if any)
            if (cameraPositions[0]) {
                camera.position.set(
                    cameraPositions[0].pos.x,
                    cameraPositions[0].pos.y,
                    cameraPositions[0].pos.z
                );
            }

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.appendChild(renderer.domElement);

            pmremGenerator = new PMREMGenerator(renderer);

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.3, 0.88));
            composer.addPass(new OutputPass());

            orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.05;
            orbitControls.autoRotate      = yes(cam['Auto-Rotate']);
            orbitControls.autoRotateSpeed = num(cam['Auto-Rotate Speed']) || 1.0;
            orbitControls.enablePan       = yes(cam['Enable Pan']);
            orbitControls.enableZoom      = yes(cam['Enable Zoom']);
            orbitControls.enableRotate    = yes(cam['Enable Rotate']);
            orbitControls.maxPolarAngle   = (Math.PI / 2) * 0.98;
            if (cameraPositions[0]) {
                orbitControls.target.set(
                    cameraPositions[0].lookAt.x,
                    cameraPositions[0].lookAt.y,
                    cameraPositions[0].lookAt.z
                );
            }
            orbitControls.update();

            setupEnvironment();
            setupToggleButtonsFromConfig();
            setupLoadersAndLoadModels();
            setupEventListeners();

            renderer.setAnimationLoop(animate);
        }

        function setupEnvironment() {
            if (config.hdriUrl) {
                new RGBELoader().load(config.hdriUrl, (texture) => {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    scene.background = texture;
                    scene.environment = pmremGenerator.fromEquirectangular(texture).texture;
                    pmremGenerator.dispose();
                    texture.dispose();
                    scene.environmentIntensity = 0.7;
                    setLoadingProgress(80);
                }, (xhr) => {
                    if (xhr.total) setLoadingProgress(Math.round((xhr.loaded / xhr.total) * 60));
                });
            }

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.5));

            const sun = new THREE.DirectionalLight(0xffffff, 3.6);
            sun.position.set(12, 24, 12);
            sun.castShadow = true;
            sun.shadow.mapSize.set(2048, 2048);
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far  = 160;
            sun.shadow.camera.left = -55; sun.shadow.camera.right = 55;
            sun.shadow.camera.top  = 55;  sun.shadow.camera.bottom = -55;
            sun.shadow.bias = -0.0001;
            sun.shadow.normalBias = 0.025;
            scene.add(sun);
        }

        function setupToggleButtonsFromConfig() {
            toggleButtons.forEach((btn, i) => {
                const cfg = sceneCfg.buttons[i];
                if (cfg) {
                    btn.textContent = cfg.name;
                    btn.dataset.id = cfg.id;
                    btn.style.display = 'block';
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        selectCamera(i);
                    });
                } else {
                    btn.style.display = 'none';
                }
            });
        }

        function setupLoadersAndLoadModels() {
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
            dracoLoader.setDecoderConfig({ type: 'js' });
            const gltfLoader = new GLTFLoader();
            gltfLoader.setDRACOLoader(dracoLoader);
            gltfLoader.setMeshoptDecoder(MeshoptDecoder);

            sceneLoadingIndicatorEl.style.display = 'block';

            const loadOne = (entry) => new Promise((resolve, reject) => {
                const url = assetUrlFor(config, entry);
                if (!url) { resolve(null); return; }
                gltfLoader.load(url, (gltf) => {
                    const root = gltf.scene;
                    root.position.set(entry.pos.x, entry.pos.y, entry.pos.z);
                    root.rotation.set(entry.rot.x, entry.rot.y, entry.rot.z);
                    root.scale.set(entry.scale.x || 1, entry.scale.y || 1, entry.scale.z || 1);
                    root.visible = entry.visible;
                    if (entry.id) root.userData.id = entry.id;
                    root.traverse((c) => {
                        if (c.isMesh) {
                            c.castShadow = true;
                            c.receiveShadow = true;
                            if (c.material && c.material.emissive) c.material.emissiveIntensity = 1;
                        }
                    });
                    scene.add(root);
                    resolve(root);
                }, undefined, reject);
            });

            Promise.all(sceneCfg.models.map(loadOne)).then(() => {
                sceneLoadingIndicatorEl.style.display = 'none';
                backgroundImgEl.style.display = 'none';
                document.getElementById('modelLabel').style.display = 'block';
                document.getElementById('fullscreenButton').style.display = 'flex';
                if (sceneCfg.buttons.length > 0) {
                    selectCamera(0);
                }
                fadeOutLoading();
            }).catch((e) => {
                console.error(e);
                sceneLoadingIndicatorEl.textContent = 'Yükleme hatası';
            });
        }

        function setupEventListeners() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });

            document.getElementById('fullscreenButton').addEventListener('click', (e) => {
                e.stopPropagation();
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                } else {
                    document.exitFullscreen().catch(() => {});
                }
            });
        }

        function animate() {
            const delta = clock.getDelta();
            if (orbitControls) orbitControls.update(delta);
            if (composer) composer.render();
        }

        init();
    </script>
</body>
</html>
